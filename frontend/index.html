<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClassMate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>ClassMate</h1>
    <p class="tagline">Pick the right professor in 15 seconds.</p>
  </header>

  <main>

    <!-- Step 1: School selection -->
    <section id="step-school">
      <p class="step-prompt">Choose your school</p>
      <div id="school-cards"></div>
    </section>

    <!-- Step 2: Course search -->
    <section id="step-course" hidden>
      <div class="step2-header">
        <button id="back-btn" type="button">← Change school</button>
        <h2 id="selected-school-name"></h2>
      </div>

      <form id="search-form" novalidate>
        <div class="field">
          <label for="course-input">Course</label>
          <div class="autocomplete-wrapper">
            <input
              id="course-input"
              type="text"
              placeholder="e.g., 'Intro to CS 2' or 'ITCS 1213'"
              autocomplete="off"
              aria-autocomplete="list"
              aria-controls="suggestions"
              required
            />
            <ul id="suggestions" role="listbox" hidden></ul>
          </div>
        </div>
        <button type="submit">Search</button>
      </form>

      <div id="status" role="status" aria-live="polite"></div>
      <div id="results"></div>
    </section>

  </main>

  <footer>
    <p class="disclaimer">
      ClassMate aggregates public Reddit and RateMyProfessor data. Insights are AI-generated
      and may be incomplete or wrong. Always cross-check with your school's catalog and an
      academic advisor.
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
